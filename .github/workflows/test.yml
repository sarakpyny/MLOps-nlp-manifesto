name: CI Tests

on:
  push:
    branches:
      - main
      - mlops
  pull_request:
    branches:
      - main
      - mlops

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run PyLint
        run: uv run pylint --fail-under=5 train.py app src tests

      - name: Run tests
        run: uv run pytest